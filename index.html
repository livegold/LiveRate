<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sattardina Gold Rate Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;font-family:'Rajdhani',sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(212,175,55,0.08)0%,transparent 60%);pointer-events:none;}

.screen{width:100vw;height:100vh;display:grid;grid-template-rows:auto 1fr auto;padding:1.5vh 2vw 1.2vh;gap:1.2vh;}

/* ── TOP BAR ── */
.topbar{display:grid;grid-template-columns:1.3fr 1fr 1.3fr;align-items:center;border-bottom:2px solid #D4AF37;padding-bottom:1vh;}

.brand-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4.2vw,5.2rem);color:#FFD700;letter-spacing:8px;line-height:1;text-shadow:0 0 40px rgba(255,215,0,0.5);}
.brand-sub{font-size:clamp(0.45rem,0.85vw,0.82rem);letter-spacing:5px;text-transform:uppercase;color:#6a5820;margin-top:3px;}

.ct{text-align:center;}
.ct-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.1rem,2.2vw,2.6rem);background:linear-gradient(180deg,#FFF9C4,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:6px;}
.ct-badge{display:inline-block;background:linear-gradient(135deg,#5a4010,#D4AF37);color:#000;font-family:'Bebas Neue',sans-serif;font-size:clamp(0.55rem,1vw,1.1rem);letter-spacing:4px;padding:3px 16px;border-radius:20px;margin-top:5px;box-shadow:0 0 25px rgba(212,175,55,0.6);}

.rt{text-align:right;display:flex;flex-direction:column;gap:4px;}
.live-row{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.dot{width:9px;height:9px;border-radius:50%;background:#00e676;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
.live-lbl{font-family:'Share Tech Mono',monospace;font-size:clamp(0.42rem,0.8vw,0.76rem);color:#00e676;letter-spacing:3px;}
.clock{font-family:'Share Tech Mono',monospace;font-size:clamp(1.1rem,2vw,2.2rem);color:#FFD700;letter-spacing:2px;}
.date-lbl{font-size:clamp(0.38rem,0.7vw,0.66rem);color:#6a5820;letter-spacing:2px;}
.upd-lbl{font-family:'Share Tech Mono',monospace;font-size:clamp(0.3rem,0.56vw,0.54rem);color:#6a5820;}

/* ── MAIN 3 COLUMNS ── */
.main{display:grid;grid-template-columns:1fr 2.1fr 1.3fr;gap:1.6vw;min-height:0;}

/* LEFT — OZ + TOLA */
.left{display:flex;flex-direction:column;gap:1.4vh;}
.bigcard{flex:1;border-radius:14px;padding:2vh 1.4vw;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden;}
.ozcard{background:linear-gradient(145deg,rgba(64,196,255,0.1),rgba(0,50,90,0.25));border:1px solid rgba(64,196,255,0.4);}
.tolacard{background:linear-gradient(145deg,rgba(212,175,55,0.12),rgba(70,45,0,0.25));border:1px solid rgba(212,175,55,0.5);}
.bigcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.ozcard::before{background:linear-gradient(90deg,transparent,#40c4ff,transparent);}
.tolacard::before{background:linear-gradient(90deg,transparent,#D4AF37,transparent);}
.bc-lbl{font-size:clamp(0.42rem,0.8vw,0.76rem);letter-spacing:4px;text-transform:uppercase;color:#6a5820;margin-bottom:0.5vh;}
.bc-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,6rem);line-height:1;}
.ozcard   .bc-val{color:#40c4ff;text-shadow:0 0 25px rgba(64,196,255,0.45);}
.tolacard .bc-val{color:#FFD700;text-shadow:0 0 25px rgba(255,215,0,0.4);}
.bc-cur{font-size:clamp(0.5rem,0.95vw,0.9rem);letter-spacing:3px;margin-top:4px;}
.ozcard   .bc-cur{color:#40c4ff;}
.tolacard .bc-cur{color:#D4AF37;}

/* CENTER — KARATS */
.center{display:flex;flex-direction:column;}
.sec-hdr{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:clamp(0.85rem,1.55vw,1.75rem);color:#D4AF37;letter-spacing:6px;margin-bottom:1vh;padding-bottom:0.8vh;border-bottom:1px solid rgba(212,175,55,0.2);}
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.9vw;flex:1;}
.kb{background:#080808;border:1px solid rgba(212,175,55,0.18);border-radius:10px;padding:1.3vh 0.5vw;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:border-color 0.3s;}
.kb.hot{border-color:rgba(212,175,55,0.48);background:linear-gradient(145deg,rgba(212,175,55,0.08),rgba(212,175,55,0.02));}
.kb-k{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.2rem,2.2vw,2.8rem);color:#FFD700;line-height:1;}
.kb-p{font-size:clamp(0.3rem,0.55vw,0.53rem);letter-spacing:2px;color:#6a5820;text-transform:uppercase;margin:2px 0 6px;}
.kb-v{font-family:'Share Tech Mono',monospace;font-size:clamp(0.9rem,1.65vw,2rem);color:#fff;letter-spacing:1px;}
.kb-u{font-size:clamp(0.28rem,0.5vw,0.48rem);letter-spacing:2px;color:#6a5820;text-transform:uppercase;margin-top:3px;}

/* RIGHT — MAKING */
.right{display:flex;flex-direction:column;}
.mk-sub{text-align:center;font-size:clamp(0.3rem,0.52vw,0.5rem);letter-spacing:3px;text-transform:uppercase;color:#6a5820;margin-bottom:1.2vh;}
.mklist{display:flex;flex-direction:column;gap:0.7vh;flex:1;}
.mkrow{display:flex;align-items:center;background:#080808;border:1px solid rgba(212,175,55,0.18);border-radius:8px;padding:0.7vh 0.8vw;gap:0.7vw;}
.mkflag{font-size:clamp(0.6rem,0.9vw,0.95rem);flex-shrink:0;}
.mkname{flex:1;font-size:clamp(0.42rem,0.78vw,0.75rem);color:#FFEB3B;letter-spacing:1px;}
.mkprice{font-family:'Share Tech Mono',monospace;font-size:clamp(0.52rem,0.98vw,0.95rem);color:#FFD700;text-align:right;}
.mkomr{font-size:clamp(0.26rem,0.46vw,0.44rem);color:#6a5820;letter-spacing:1px;text-align:right;}

/* TICKER */
.ticker{border-top:1px solid rgba(212,175,55,0.2);padding-top:0.7vh;overflow:hidden;position:relative;height:clamp(1.4rem,2.5vh,2.3rem);}
.tinner{display:flex;gap:3vw;white-space:nowrap;animation:scroll 40s linear infinite;position:absolute;top:50%;transform:translateY(-50%);}
@keyframes scroll{from{transform:translateY(-50%) translateX(0)}to{transform:translateY(-50%) translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:0.6vw;font-family:'Share Tech Mono',monospace;font-size:clamp(0.4rem,0.74vw,0.72rem);}
.ti-l{color:#6a5820;letter-spacing:2px;}.ti-v{color:#FFD700;}.ti-s{color:#6a5820;}
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div>
      <div class="brand-name">SATTARDINA</div>
      <div class="brand-sub">Premium Gold · Muscat, Oman</div>
    </div>
    <div class="ct">
      <div class="ct-title">◆ GOLD RATE LIVE ◆</div>
      <div class="ct-badge">PS ★ JEWELLERS</div>
    </div>
    <div class="rt">
      <div class="live-row"><div class="dot"></div><div class="live-lbl">LIVE MARKET</div></div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-lbl" id="dateEl">---</div>
      <div class="upd-lbl" id="updLbl">Fetching...</div>
    </div>
  </div>

  <div class="main">
    <div class="left">
      <div class="bigcard ozcard">
        <div class="bc-lbl">1 Ounce · International</div>
        <div class="bc-val" id="ozVal">—</div>
        <div class="bc-cur">USD / Troy Oz</div>
      </div>
      <div class="bigcard tolacard">
        <div class="bc-lbl">21K Tola · Local</div>
        <div class="bc-val" id="tolaVal">—</div>
        <div class="bc-cur">OMR</div>
      </div>
    </div>

    <div class="center">
      <div class="sec-hdr">◆ GOLD PURITY RATES PER GRAM · OMR ◆</div>
      <div class="kgrid" id="kgrid"></div>
    </div>

    <div class="right">
      <div class="sec-hdr">MAKING CHARGES</div>
      <div class="mk-sub">Starting from · OMR per gram</div>
      <div class="mklist" id="mklist"></div>
    </div>
  </div>

  <div class="ticker">
    <div class="tinner" id="ticker"></div>
  </div>
</div>

<script>
// ── Making charges — render once ──
var MAKING = [
  {name:'Omani Hand Made',   flag:'🇴🇲', charge:3.500},
  {name:'Omani Machine Made',flag:'🇴🇲', charge:2.000},
  {name:'Singapore',         flag:'🇸🇬', charge:3.500},
  {name:'Saudi',             flag:'🇸🇦', charge:4.000},
  {name:'Turkish',           flag:'🇹🇷', charge:4.500},
  {name:'Kuwaiti',           flag:'🇰🇼', charge:4.000},
  {name:'Bahraini',          flag:'🇧🇭', charge:4.500},
  {name:'Emirati',           flag:'🇦🇪', charge:3.500},
];
var ml = document.getElementById('mklist');
MAKING.forEach(function(m){
  var r = document.createElement('div');
  r.className = 'mkrow';
  r.innerHTML = '<div class="mkflag">'+m.flag+'</div>'
    +'<div class="mkname">'+m.name+'</div>'
    +'<div><div class="mkprice">'+m.charge.toFixed(3)+'</div><div class="mkomr">OMR/g</div></div>';
  ml.appendChild(r);
});

// ── Clock ──
function tick(){
  var n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dateEl').textContent =
    n.toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}).toUpperCase();
}
setInterval(tick,1000); tick();

// ── Render all prices ──
function render(p){
  // Formula from your working reference script
  var p24k = (p * 1.4485 + 15) / 116.64;
  var fmt  = function(x){ return x.toFixed(3); };

  // OZ + Tola
  document.getElementById('ozVal').textContent   = Math.floor(p).toLocaleString();
  document.getElementById('tolaVal').textContent = fmt(p24k * 0.879 * 11.664);

  // Karats
  var KARATS = [
    {k:'24K', p:'99.9%', v:p24k,           hot:false},
    {k:'22K', p:'91.6%', v:p24k * 0.920,   hot:true },
    {k:'21K', p:'87.5%', v:p24k * 0.879,   hot:true },
    {k:'20K', p:'83.3%', v:p24k * (20/24), hot:false},
    {k:'18K', p:'75.0%', v:p24k * 0.755,   hot:true },
    {k:'16K', p:'66.6%', v:p24k * (16/24), hot:false},
    {k:'14K', p:'58.3%', v:p24k * (14/24), hot:false},
    {k:'10K', p:'41.6%', v:p24k * (10/24), hot:false},
    {k:'9K',  p:'37.5%', v:p24k * (9/24),  hot:false},
  ];

  var grid = document.getElementById('kgrid');
  grid.innerHTML = '';
  KARATS.forEach(function(k){
    var b = document.createElement('div');
    b.className = 'kb' + (k.hot ? ' hot' : '');
    b.innerHTML = '<div class="kb-k">'+k.k+'</div>'
      +'<div class="kb-p">'+k.p+'</div>'
      +'<div class="kb-v">'+fmt(k.v)+'</div>'
      +'<div class="kb-u">OMR / gram</div>';
    grid.appendChild(b);
  });

  // Ticker
  var items = KARATS.map(function(k){
    return '<span class="ti"><span class="ti-l">'+k.k+'</span>'
      +'<span class="ti-v">'+fmt(k.v)+' OMR</span>'
      +'<span class="ti-s">◆</span></span>';
  }).join('');
  document.getElementById('ticker').innerHTML = items + items;

  // Timestamp
  var now = new Date();
  document.getElementById('updLbl').textContent = 'Updated: '
    + now.toLocaleString('en-US',{month:'short',day:'2-digit',year:'numeric',
      hour:'numeric',minute:'2-digit',hour12:true});
}

// ── FETCH — exact same as your working script ──
async function fetchGoldPrice() {
  try {
    const response = await fetch("https://api.gold-api.com/price/XAU");
    const data = await response.json();
    render(data.price);
  } catch (error) {
    document.getElementById('updLbl').textContent = 'Error: ' + error.message;
    console.error(error);
  }
}

fetchGoldPrice();
setInterval(fetchGoldPrice, 30000);
</script>
</body>
</html>
EOF
echo "Done"
